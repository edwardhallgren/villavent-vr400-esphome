## Villavent Dashboard Card
##
## Requirements:
##   HACS frontend integrations:
##     - mushroom            (https://github.com/piitaya/lovelace-mushroom)
##     - card-mod            (https://github.com/thomasloven/lovelace-card-mod)
##     - timer-bar-card      (https://github.com/rianadon/timer-bar-card)
##
## Entity naming:
##   This card assumes the ESPHome device is named "vr" (producing entity IDs
##   like binary_sensor.vr_flakt_lage_max). If your device has a different name,
##   do a find-and-replace on the "vr_" prefix below.
##
## Additional HA helpers required (create in Settings > Automations > Scripts/Timers):
##
##   Scripts:
##     script.set_fan_to_min
##     script.set_fan_to_normal
##     script.set_fan_to_max_2
##     script.set_temp_to_0  through  script.set_temp_to_5
##     script.villavent_boost_20min
##
##   Timer:
##     timer.villavent_boost_timer   (duration: 00:20:00)
##
## Each set_fan_to_* and set_temp_to_* script should press the UP or DOWN button
## the correct number of times to reach the target level from any starting state,
## or use a loop that reads the current sensor and presses until target is reached.

type: vertical-stack
cards:
  - type: markdown
    content: |
      ### 🌬️ Villavent Styrning
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          text-align: center;
          padding: 8px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:sun-thermometer
        content: Sommar
        icon_color: >-
          {{ 'amber' if is_state('binary_sensor.vr_sommardrift', 'on') else
          'grey' }}
        tap_action:
          action: none
      - type: template
        icon: mdi:lightning-bolt
        content: Elpatron
        icon_color: >-
          {{ 'orange' if is_state('binary_sensor.vr_elpatron_aktiv', 'on') else
          'grey' }}
        tap_action:
          action: none
      - type: template
        entity: binary_sensor.vr_filter_byte
        icon: mdi:air-filter
        content: Filter
        icon_color: >-
          {{ 'red' if is_state('binary_sensor.vr_filter_byte', 'on') else
          'green' }}
        tap_action:
          action: more-info
    alignment: center
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:fan-speed-1
        content: Min
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.vr_flakt_lage_min', 'on') else
          'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_fan_to_min
      - type: template
        icon: mdi:fan-speed-2
        content: Norm
        icon_color: >-
          {{ 'orange' if is_state('binary_sensor.vr_flakt_lage_normal', 'on')
          else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_fan_to_normal
      - type: template
        icon: mdi:fan-speed-3
        content: Max
        icon_color: >-
          {{ 'red' if is_state('binary_sensor.vr_flakt_lage_max', 'on') else
          'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_fan_to_max_2
    alignment: center
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.vr_flakt_aktuellt_lage') }}"
    secondary: Aktuellt fläktläge
    icon: mdi:fan
    icon_color: >-
      {% if is_state('binary_sensor.vr_flakt_lage_max', 'on') %} red {% elif
      is_state('binary_sensor.vr_flakt_lage_normal', 'on') %} orange {% elif
      is_state('binary_sensor.vr_flakt_lage_min', 'on') %} green {% else %} grey
      {% endif %}
    layout: vertical
    card_mod:
      style: |
        ha-card {
          text-align: center;
          background: rgba(255,255,255,0.05);
        }
        .primary {
          font-size: 24px !important;
          font-weight: bold !important;
        }
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Ned
        icon: mdi:fan-chevron-down
        icon_color: blue
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: switch.turn_on
          target:
            entity_id: switch.vr_flakt_ned
        card_mod:
          style: |
            ha-card {
              border: 2px solid #2196F3;
              transition: all 0.3s ease;
            }
            ha-card:active {
              transform: scale(0.95);
            }
      - type: custom:mushroom-template-card
        primary: Upp
        icon: mdi:fan-chevron-up
        icon_color: blue
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: switch.turn_on
          target:
            entity_id: switch.vr_flakt_upp
        card_mod:
          style: |
            ha-card {
              border: 2px solid #2196F3;
              transition: all 0.3s ease;
            }
            ha-card:active {
              transform: scale(0.95);
            }
  - type: conditional
    conditions:
      - condition: state
        entity: timer.villavent_boost_timer
        state_not: active
    card:
      type: custom:mushroom-template-card
      primary: Boost 20 min
      secondary: Maximal ventilation
      icon: mdi:turbine
      icon_color: purple
      layout: horizontal
      tap_action:
        action: perform-action
        perform_action: script.villavent_boost_20min
      card_mod:
        style: |
          ha-card {
            border: 2px solid #9C27B0;
            background: rgba(156, 39, 176, 0.1);
            transition: all 0.3s ease;
          }
          ha-card:active {
            transform: scale(0.97);
          }
  - type: conditional
    conditions:
      - condition: state
        entity: timer.villavent_boost_timer
        state: active
    card:
      type: custom:timer-bar-card
      entity: timer.villavent_boost_timer
      name: Boost pågår
      icon: mdi:turbine
      active_icon: mdi:turbine
      bar_height: 8px
      bar_foreground: "#F44336"
      bar_background: rgba(244, 67, 54, 0.2)
      text_width: 3em
      tap_action:
        action: perform-action
        perform_action: timer.cancel
        target:
          entity_id: timer.villavent_boost_timer
      card_mod:
        style: |
          ha-card {
            border: 2px solid #F44336;
            background: rgba(244, 67, 54, 0.1);
          }
  - type: markdown
    content: |
      ### 🌡️ Temperaturkontroll
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05);
          text-align: center;
          padding: 4px;
        }
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:snowflake
        content: "0"
        icon_color: >-
          {{ 'light-blue' if is_state('sensor.vr_temp_aktuellt_lage', '0') else
          'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_0
      - type: template
        icon: mdi:numeric-1-circle
        content: ""
        icon_color: >-
          {{ 'blue' if is_state('sensor.vr_temp_aktuellt_lage', '1') else 'grey'
          }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_1
      - type: template
        icon: mdi:numeric-2-circle
        content: ""
        icon_color: >-
          {{ 'cyan' if is_state('sensor.vr_temp_aktuellt_lage', '2') else 'grey'
          }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_2
      - type: template
        icon: mdi:numeric-3-circle
        content: ""
        icon_color: >-
          {{ 'green' if is_state('sensor.vr_temp_aktuellt_lage', '3') else
          'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_3
      - type: template
        icon: mdi:numeric-4-circle
        content: ""
        icon_color: >-
          {{ 'orange' if is_state('sensor.vr_temp_aktuellt_lage', '4') else
          'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_4
      - type: template
        icon: mdi:numeric-5-circle
        content: ""
        icon_color: >-
          {{ 'red' if is_state('sensor.vr_temp_aktuellt_lage', '5') else 'grey'
          }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_5
    alignment: center
  - type: custom:mushroom-template-card
    primary: |-
      {% if is_state('sensor.vr_temp_aktuellt_lage', '0') %}
        Läge 0 - Sommardrift
      {% else %}
        Läge {{ states('sensor.vr_temp_aktuellt_lage') }}
      {% endif %}
    secondary: |-
      {% if is_state('sensor.vr_temp_aktuellt_lage', '0') %}
        Manuell kyla (ingen uppvärmning)
      {% elif is_state('sensor.vr_temp_aktuellt_lage', '1') %}
        Kallast (mest energieffektivt)
      {% elif is_state('sensor.vr_temp_aktuellt_lage', '2') %}
        Kallt (rekommenderat vinter)
      {% elif is_state('sensor.vr_temp_aktuellt_lage', '3') %}
        Normal
      {% elif is_state('sensor.vr_temp_aktuellt_lage', '4') %}
        Varmt
      {% elif is_state('sensor.vr_temp_aktuellt_lage', '5') %}
        Varmast (endast vid extremkyla)
      {% else %}
        Okänt läge
      {% endif %}
    icon: mdi:thermometer
    icon_color: >-
      {% set temp = states('sensor.vr_temp_aktuellt_lage') %} {% if temp == '0'
      %} light-blue {% elif temp == '1' %} blue {% elif temp == '2' %} cyan {%
      elif temp == '3' %} green {% elif temp == '4' %} orange {% elif temp ==
      '5' %} red {% else %} grey {% endif %}
    layout: vertical
    card_mod:
      style: |
        ha-card {
          text-align: center;
          background: rgba(255,255,255,0.05);
        }
        .primary {
          font-size: 20px !important;
          font-weight: bold !important;
        }
  - type: markdown
    content: |
      ### 🔧 Admin — Filterbyte
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05);
          text-align: center;
          padding: 4px;
        }
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:led-on
        content: Filter bekräftad
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.vr_filter_reset_bekraftad', 'on') else 'grey' }}
        tap_action:
          action: none
      - type: template
        icon: mdi:calendar-clock
        content: "{{ states('sensor.vr_filter_intervall') }}"
        icon_color: blue
        tap_action:
          action: none
    alignment: center
  - type: custom:mushroom-template-card
    primary: Filter Reset
    secondary: Håll Tidur 5 sek
    icon: mdi:air-filter
    icon_color: orange
    layout: horizontal
    tap_action:
      action: perform-action
      perform_action: button.press
      target:
        entity_id: button.vr_filter_reset
    card_mod:
      style: |
        ha-card {
          border: 2px solid #FF9800;
          background: rgba(255, 152, 0, 0.1);
          transition: all 0.3s ease;
        }
        ha-card:active {
          transform: scale(0.97);
        }
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Kortare
        secondary: Tidur + Temp Ned
        icon: mdi:calendar-minus
        icon_color: blue
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_filter_intervall_kortare
        card_mod:
          style: |
            ha-card {
              border: 2px solid #2196F3;
              transition: all 0.3s ease;
            }
            ha-card:active {
              transform: scale(0.95);
            }
      - type: custom:mushroom-template-card
        primary: Längre
        secondary: Tidur + Temp Upp
        icon: mdi:calendar-plus
        icon_color: orange
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_filter_intervall_langre
        card_mod:
          style: |
            ha-card {
              border: 2px solid #FF9800;
              transition: all 0.3s ease;
            }
            ha-card:active {
              transform: scale(0.95);
            }
  - type: markdown
    content: |
      ### ⚙️ Admin — Normalflöde
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.05);
          text-align: center;
          padding: 4px;
        }
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:led-on
        content: Bekräftad
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.vr_installning_bekraftad', 'on') else 'grey' }}
        tap_action:
          action: none
    alignment: center
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        primary: Normal Låg
        secondary: Tidur + Fläkt Ned
        icon: mdi:fan-speed-1
        icon_color: blue
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_normal_hastighet_lag
        card_mod:
          style: |
            ha-card {
              border: 2px solid #2196F3;
              transition: all 0.3s ease;
            }
            ha-card:active {
              transform: scale(0.95);
            }
      - type: custom:mushroom-template-card
        primary: Normal Hög
        secondary: Tidur + Fläkt Upp
        icon: mdi:fan-speed-3
        icon_color: orange
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_normal_hastighet_hog
        card_mod:
          style: |
            ha-card {
              border: 2px solid #FF9800;
              transition: all 0.3s ease;
            }
            ha-card:active {
              transform: scale(0.95);
            }
