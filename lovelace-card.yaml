## Villavent Dashboard Card
##
## Requirements:
##   HACS frontend integrations:
##     - mushroom            (https://github.com/piitaya/lovelace-mushroom)
##     - card-mod            (https://github.com/thomasloven/lovelace-card-mod)
##     - timer-bar-card      (https://github.com/rianadon/timer-bar-card)
##
## Entity naming:
##   This card assumes the ESPHome device is named "vr" (producing entity IDs
##   like binary_sensor.vr_flakt_lage_max). If your device has a different name,
##   do a find-and-replace on the "vr_" prefix below.
##
## Additional HA helpers required (create in Settings > Automations & Scripts/Timers):
##   Scripts: set_fan_to_min, set_fan_to_normal, set_fan_to_max_2,
##            set_temp_to_0…5, villavent_boost_20min
##   Timer:   villavent_boost_timer (duration: 00:20:00)

type: vertical-stack
cards:
  - type: markdown
    content: |
      ### 🌬️ Villavent Styrning
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          text-align: center;
          padding: 8px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

  # ─── Status ────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:sun-thermometer
        content: Sommar
        icon_color: >-
          {{ 'amber' if is_state('binary_sensor.vr_sommardrift', 'on') else 'grey' }}
        tap_action:
          action: none
      - type: template
        icon: mdi:lightning-bolt
        content: Elpatron
        icon_color: >-
          {{ 'orange' if is_state('binary_sensor.vr_elpatron_aktiv', 'on') else 'grey' }}
        tap_action:
          action: none
      - type: template
        icon: mdi:air-filter
        content: Filter
        icon_color: >-
          {{ 'red' if is_state('binary_sensor.vr_filter_byte', 'on') else 'grey' }}
        tap_action:
          action: more-info
          entity: binary_sensor.vr_filter_byte
    alignment: center

  # ─── Fläkthastighet ────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:fan-speed-1
        content: Min
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.vr_flakt_lage_min', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_fan_to_min
      - type: template
        icon: mdi:fan-speed-2
        content: Norm
        icon_color: >-
          {{ 'orange' if is_state('binary_sensor.vr_flakt_lage_normal', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_fan_to_normal
      - type: template
        icon: mdi:fan-speed-3
        content: Max
        icon_color: >-
          {{ 'red' if is_state('binary_sensor.vr_flakt_lage_max', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_fan_to_max_2
    alignment: center

  # ─── Boost ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: timer.villavent_boost_timer
        state_not: active
    card:
      type: custom:mushroom-template-card
      primary: Boost 20 min
      secondary: Maximal ventilation
      icon: mdi:turbine
      icon_color: purple
      layout: horizontal
      tap_action:
        action: perform-action
        perform_action: script.villavent_boost_20min
      card_mod:
        style: |
          ha-card {
            border: 2px solid #9C27B0;
            background: rgba(156, 39, 176, 0.1);
            transition: all 0.3s ease;
          }
          ha-card:active { transform: scale(0.97); }
  - type: conditional
    conditions:
      - condition: state
        entity: timer.villavent_boost_timer
        state: active
    card:
      type: custom:timer-bar-card
      entity: timer.villavent_boost_timer
      name: Boost pågår
      icon: mdi:turbine
      active_icon: mdi:turbine
      bar_height: 8px
      bar_foreground: "#F44336"
      bar_background: rgba(244, 67, 54, 0.2)
      text_width: 3em
      tap_action:
        action: perform-action
        perform_action: timer.cancel
        target:
          entity_id: timer.villavent_boost_timer
      card_mod:
        style: |
          ha-card {
            border: 2px solid #F44336;
            background: rgba(244, 67, 54, 0.1);
          }

  # ─── Temperaturkontroll ────────────────────────────────────────────────────
  - type: markdown
    content: >
      ### 🌡️ Temperaturkontroll
      ({% set t = states('sensor.vr_temp_aktuellt_lage') %}{% if t == '0' %}0
      — Sommardrift{% elif t == '1' %}1 — Kallast{% elif t == '2' %}2 — Kallt{%
      elif t == '3' %}3 — Normal{% elif t == '4' %}4 — Varmt{% elif t == '5'
      %}5 — Varmast{% else %}Okänt{% endif %})
    card_mod:
      style: |
        ha-card { background: rgba(255,255,255,0.05); text-align: center; padding: 4px; }
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:snowflake
        content: "0"
        icon_color: >-
          {{ 'light-blue' if is_state('sensor.vr_temp_aktuellt_lage', '0') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_0
      - type: template
        icon: mdi:numeric-1-circle
        content: ""
        icon_color: >-
          {{ 'blue' if is_state('sensor.vr_temp_aktuellt_lage', '1') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_1
      - type: template
        icon: mdi:numeric-2-circle
        content: ""
        icon_color: >-
          {{ 'cyan' if is_state('sensor.vr_temp_aktuellt_lage', '2') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_2
      - type: template
        icon: mdi:numeric-3-circle
        content: ""
        icon_color: >-
          {{ 'green' if is_state('sensor.vr_temp_aktuellt_lage', '3') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_3
      - type: template
        icon: mdi:numeric-4-circle
        content: ""
        icon_color: >-
          {{ 'orange' if is_state('sensor.vr_temp_aktuellt_lage', '4') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_4
      - type: template
        icon: mdi:numeric-5-circle
        content: ""
        icon_color: >-
          {{ 'red' if is_state('sensor.vr_temp_aktuellt_lage', '5') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: script.set_temp_to_5
    alignment: center
  # ─── Admin ─────────────────────────────────────────────────────────────────
  - type: markdown
    content: |
      ### ⚙️ Admin
    card_mod:
      style: |
        ha-card { background: rgba(255,255,255,0.05); text-align: center; padding: 4px; }

  # Filter Reset
  - type: custom:mushroom-template-card
    primary: Filter Reset
    secondary: >-
      {{ 'Bekräftad ✓' if is_state('binary_sensor.vr_filter_reset_bekraftad', 'on') else 'Håll Tidur 5 sek' }}
    icon: mdi:air-filter
    icon_color: >-
      {{ 'green' if is_state('binary_sensor.vr_filter_reset_bekraftad', 'on') else 'orange' }}
    layout: horizontal
    tap_action:
      action: perform-action
      perform_action: button.press
      target:
        entity_id: button.vr_filter_reset
    card_mod:
      style: |
        ha-card {
          border: 2px solid {{ 'green' if is_state('binary_sensor.vr_filter_reset_bekraftad', 'on') else '#FF9800' }};
          background: rgba(255, 152, 0, 0.07);
          transition: all 0.3s ease;
        }
        ha-card:active { transform: scale(0.97); }

  # Filter interval preset
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:calendar-range
        content: "6 mån"
        icon_color: >-
          {{ 'green' if states('sensor.vr_filter_intervall_sparat') == '6 mån' else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_filter_6_man
      - type: template
        icon: mdi:calendar-range
        content: "9 mån"
        icon_color: >-
          {{ 'orange' if states('sensor.vr_filter_intervall_sparat') == '9 mån' else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_filter_9_man
      - type: template
        icon: mdi:calendar-range
        content: "12 mån"
        icon_color: >-
          {{ 'blue' if states('sensor.vr_filter_intervall_sparat') == '12 mån' else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_filter_12_man
    alignment: center

  # Normalflöde
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:fan-speed-1
        content: Norm Låg
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.vr_installning_bekraftad', 'on') else 'blue' }}
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_normal_hastighet_lag
      - type: template
        icon: mdi:fan-speed-3
        content: Norm Hög
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.vr_installning_bekraftad', 'on') else 'orange' }}
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.vr_normal_hastighet_hog
    alignment: center
