esphome:
  name: vr
  friendly_name: VR

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Vr Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

# ─── Output for long-press operations ───────────────────────────────────────

output:
  - platform: gpio
    pin: GPIO2
    id: out_fan_up

  - platform: gpio
    pin: GPIO1
    id: out_fan_down

  - platform: gpio
    pin: GPIO3
    id: out_tidur

  - platform: gpio
    pin: GPIO6
    id: out_temp_up

  - platform: gpio
    pin: GPIO5
    id: out_temp_down

globals:
  - id: blink_counter
    type: int
    restore_value: no
    initial_value: '0'

  - id: filter_intervall_manader
    type: int
    restore_value: yes
    initial_value: '0'

  - id: filter_confirmed
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 2s
    then:
      - lambda: 'id(blink_counter) = 0;'

# ─── Switches: Button Simulation (300ms pulse via optocoupler) ───────────────
# Uses switch + auto-off so HA can call switch.turn_on directly

switch:
  - platform: template
    id: sw_fan_up
    name: "Fläkt Upp"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_fan_up
      - delay: 300ms
      - output.turn_off: out_fan_up
      - switch.template.publish:
          id: sw_fan_up
          state: false

  - platform: template
    id: sw_fan_down
    name: "Fläkt Ned"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_fan_down
      - delay: 300ms
      - output.turn_off: out_fan_down
      - switch.template.publish:
          id: sw_fan_down
          state: false

  - platform: template
    id: sw_temp_up
    name: "Temp Upp"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_temp_up
      - delay: 300ms
      - output.turn_off: out_temp_up
      - switch.template.publish:
          id: sw_temp_up
          state: false

  - platform: template
    id: sw_temp_down
    name: "Temp Ned"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_temp_down
      - delay: 300ms
      - output.turn_off: out_temp_down
      - switch.template.publish:
          id: sw_temp_down
          state: false

  - platform: template
    id: sw_tidur
    name: "Tidur"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_tidur
      - delay: 300ms
      - output.turn_off: out_tidur
      - switch.template.publish:
          id: sw_tidur
          state: false

# ─── Admin: Normal Speed Setting ─────────────────────────────────────────────

button:
  - platform: template
    name: "Normal Hastighet Hög"
    icon: "mdi:fan-speed-3"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_fan_up
      - delay: 300ms
      - output.turn_off: out_fan_up
      - output.turn_off: out_tidur

  - platform: template
    name: "Normal Hastighet Låg"
    icon: "mdi:fan-speed-1"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_fan_down
      - delay: 300ms
      - output.turn_off: out_fan_down
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter Reset"
    icon: "mdi:air-filter"
    on_press:
      - output.turn_on: out_tidur
      - delay: 5s
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter Intervall Längre"
    icon: "mdi:calendar-plus"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_temp_up
      - delay: 300ms
      - output.turn_off: out_temp_up
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter Intervall Kortare"
    icon: "mdi:calendar-minus"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_temp_down
      - delay: 300ms
      - output.turn_off: out_temp_down
      - output.turn_off: out_tidur

# ─── Binary Sensors: LED Reading (pullup + inverted) ─────────────────────────

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO42
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Max"
    id: fan_max
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Normal"
    id: fan_normal
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO40
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Min"
    id: fan_min
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO35
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 6"
    id: temp_lamp6
    internal: true

  - platform: gpio
    pin:
      number: GPIO34
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 7"
    id: temp_lamp7
    internal: true

  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 8"
    id: temp_lamp8
    internal: true

  # Optional — comment out if not yet wired
  - platform: gpio
    pin:
      number: GPIO46
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Elpatron Aktiv"

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Sommardrift"

  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Filter Byte"
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  # ─── Admin: Confirmation Blink Sensors ──────────────────────────────────────

  - platform: template
    name: "Inställning Bekräftad"
    icon: "mdi:led-on"
    lambda: |-
      return id(blink_counter) >= 6;

  # Internal: fires briefly when blink pattern matches filter reset
  - platform: template
    id: filter_reset_trigger
    internal: true
    lambda: |-
      return id(blink_counter) >= 4 && id(fan_max).state == false
             && id(fan_normal).state == false && id(fan_min).state == false;
    on_state:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lambda: 'id(filter_confirmed) = true;'
            - delay: 500ms
            - lambda: |-
                if (id(temp_lamp6).state)      id(filter_intervall_manader) = 12;
                else if (id(temp_lamp7).state) id(filter_intervall_manader) = 9;
                else if (id(temp_lamp8).state) id(filter_intervall_manader) = 6;
            - delay: 4500ms
            - lambda: 'id(filter_confirmed) = false;'

  # Latched: stays ON for 5s after a confirmed filter reset
  - platform: template
    name: "Filter Reset Bekräftad"
    icon: "mdi:air-filter"
    lambda: |-
      return id(filter_confirmed);

# ─── Sensors: Derived State ───────────────────────────────────────────────────

text_sensor:
  - platform: template
    name: "Fläkt Aktuellt Läge"
    update_interval: 1s
    lambda: |-
      if (id(fan_max).state)    return {"MAX"};
      if (id(fan_normal).state) return {"NORMAL"};
      if (id(fan_min).state)    return {"MIN"};
      return {"OKÄND"};

  - platform: template
    name: "Temp Aktuellt Läge"
    update_interval: 1s
    icon: "mdi:thermometer"
    lambda: |-
      bool l6 = id(temp_lamp6).state;
      bool l7 = id(temp_lamp7).state;
      bool l8 = id(temp_lamp8).state;
      if (!l6 && !l7 && !l8) return {"0"};
      if ( l6 && !l7 && !l8) return {"1"};
      if ( l6 &&  l7 && !l8) return {"2"};
      if (!l6 &&  l7 && !l8) return {"3"};
      if (!l6 &&  l7 &&  l8) return {"4"};
      if (!l6 && !l7 &&  l8) return {"5"};
      return {"-1"};

  - platform: template
    name: "Filter Intervall"
    update_interval: 2s
    icon: "mdi:calendar-clock"
    lambda: |-
      if (id(temp_lamp6).state) return {"12 mån"};
      if (id(temp_lamp7).state) return {"9 mån"};
      if (id(temp_lamp8).state) return {"6 mån"};
      return {"Okänt"};

  - platform: template
    name: "Filter Intervall Sparat"
    update_interval: 10s
    icon: "mdi:calendar-clock"
    lambda: |-
      int m = id(filter_intervall_manader);
      if (m == 12) return {"12 mån"};
      if (m == 9)  return {"9 mån"};
      if (m == 6)  return {"6 mån"};
      return {"Okänt"};
