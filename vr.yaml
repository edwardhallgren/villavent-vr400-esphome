esphome:
  name: vr
  friendly_name: VR

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Vr Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

# ─── Output for long-press operations ───────────────────────────────────────

output:
  - platform: gpio
    pin: GPIO2
    id: out_fan_up

  - platform: gpio
    pin: GPIO1
    id: out_fan_down

  - platform: gpio
    pin: GPIO3
    id: out_tidur

  - platform: gpio
    pin: GPIO6
    id: out_temp_up

  - platform: gpio
    pin: GPIO5
    id: out_temp_down

globals:
  - id: blink_counter
    type: int
    restore_value: no
    initial_value: '0'

  - id: filter_intervall_manader
    type: int
    restore_value: yes
    initial_value: '0'

  - id: filter_confirmed
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: filter_target_manader
    type: int
    restore_value: no
    initial_value: '0'

  - id: nav_steps
    type: int
    restore_value: no
    initial_value: '0'

  - id: boost_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: boost_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

interval:
  - interval: 2s
    then:
      - lambda: 'id(blink_counter) = 0;'

# ─── Script: Auto-navigate filter interval to a target ───────────────────────
# Uses a single Längre probe-press to discover current state if unknown,
# then presses Kortare/Längre until target is reached, then confirms with
# a 5-second Tidur hold (Filter Reset).

script:
  - id: set_filter_interval_script
    mode: single
    then:
      # Hold Tidur to enter filter interval configuration mode
      - output.turn_on: out_tidur
      - delay: 1000ms

      # Step 1: If interval unknown, probe with one Längre press (Tidur still held)
      # Read lamp BEFORE releasing Tidur so the unit is still in filter interval mode.
      - if:
          condition:
            lambda: 'return id(filter_intervall_manader) == 0;'
          then:
            - output.turn_on: out_temp_up
            - delay: 300ms
            - output.turn_off: out_temp_up
            - delay: 600ms
            - lambda: |-
                if      (id(temp_lamp6).state) id(filter_intervall_manader) = 12;
                else if (id(temp_lamp7).state) id(filter_intervall_manader) = 9;
                else if (id(temp_lamp8).state) id(filter_intervall_manader) = 6;

      # Step 2: Calculate steps from current position to target
      - lambda: |-
          int cur = id(filter_intervall_manader);
          int tgt = id(filter_target_manader);
          if (cur == 0 || tgt == 0) {
            id(nav_steps) = 0;
          } else {
            int ci = (cur == 6) ? 0 : (cur == 9) ? 1 : 2;
            int ti = (tgt == 6) ? 0 : (tgt == 9) ? 1 : 2;
            id(nav_steps) = ti - ci;
          }

      # Step 3: Press Längre for each positive step (Tidur held throughout)
      - while:
          condition:
            lambda: 'return id(nav_steps) > 0;'
          then:
            - output.turn_on: out_temp_up
            - delay: 300ms
            - output.turn_off: out_temp_up
            - lambda: 'id(nav_steps)--;'
            - delay: 600ms

      # Step 4: Press Kortare for each negative step (Tidur held throughout)
      - while:
          condition:
            lambda: 'return id(nav_steps) < 0;'
          then:
            - output.turn_on: out_temp_down
            - delay: 300ms
            - output.turn_off: out_temp_down
            - lambda: 'id(nav_steps)++;'
            - delay: 600ms

      # Step 5: Continue holding Tidur to trigger Filter Reset (total hold ≥ 5 s)
      - delay: 4500ms
      - output.turn_off: out_tidur

      # Step 6: Save confirmed interval to the persistent global
      - lambda: |-
          if (id(filter_target_manader) != 0)
            id(filter_intervall_manader) = id(filter_target_manader);
          id(filter_target_manader) = 0;

  # ─── Boost: 20 minutes at max fan, then return to normal ─────────────────
  - id: boost_script
    mode: single
    then:
      - lambda: |-
          id(boost_active) = true;
          id(boost_start_ms) = millis();
      # Press fan up twice to reach MAX from any starting level
      - output.turn_on: out_fan_up
      - delay: 300ms
      - output.turn_off: out_fan_up
      - delay: 1500ms
      - output.turn_on: out_fan_up
      - delay: 300ms
      - output.turn_off: out_fan_up
      # Hold for 20 minutes
      - delay: 20min
      # Return to normal: one press down from MAX
      - output.turn_on: out_fan_down
      - delay: 300ms
      - output.turn_off: out_fan_down
      - lambda: 'id(boost_active) = false;'

# ─── Switches: Button Simulation (300ms pulse via optocoupler) ───────────────
# Uses switch + auto-off so HA can call switch.turn_on directly

switch:
  - platform: template
    id: sw_fan_up
    name: "Fläkt Upp"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_fan_up
      - delay: 300ms
      - output.turn_off: out_fan_up
      - switch.template.publish:
          id: sw_fan_up
          state: false

  - platform: template
    id: sw_fan_down
    name: "Fläkt Ned"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_fan_down
      - delay: 300ms
      - output.turn_off: out_fan_down
      - switch.template.publish:
          id: sw_fan_down
          state: false

  - platform: template
    id: sw_temp_up
    name: "Temp Upp"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_temp_up
      - delay: 300ms
      - output.turn_off: out_temp_up
      - switch.template.publish:
          id: sw_temp_up
          state: false

  - platform: template
    id: sw_temp_down
    name: "Temp Ned"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_temp_down
      - delay: 300ms
      - output.turn_off: out_temp_down
      - switch.template.publish:
          id: sw_temp_down
          state: false

  - platform: template
    id: sw_tidur
    name: "Tidur"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: out_tidur
      - delay: 300ms
      - output.turn_off: out_tidur
      - switch.template.publish:
          id: sw_tidur
          state: false

# ─── Admin: Normal Speed Setting ─────────────────────────────────────────────

button:
  - platform: template
    name: "Boost Start"
    icon: "mdi:turbine"
    on_press:
      - script.execute: boost_script

  - platform: template
    name: "Boost Stopp"
    icon: "mdi:turbine"
    on_press:
      - script.stop: boost_script
      - output.turn_on: out_fan_down
      - delay: 300ms
      - output.turn_off: out_fan_down
      - lambda: 'id(boost_active) = false;'

  - platform: template
    name: "Normal Hastighet Hög"
    icon: "mdi:fan-speed-3"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_fan_up
      - delay: 300ms
      - output.turn_off: out_fan_up
      - output.turn_off: out_tidur

  - platform: template
    name: "Normal Hastighet Låg"
    icon: "mdi:fan-speed-1"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_fan_down
      - delay: 300ms
      - output.turn_off: out_fan_down
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter Reset"
    icon: "mdi:air-filter"
    on_press:
      - output.turn_on: out_tidur
      - delay: 5s
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter Intervall Längre"
    icon: "mdi:calendar-plus"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_temp_up
      - delay: 300ms
      - output.turn_off: out_temp_up
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter Intervall Kortare"
    icon: "mdi:calendar-minus"
    on_press:
      - output.turn_on: out_tidur
      - delay: 1s
      - output.turn_on: out_temp_down
      - delay: 300ms
      - output.turn_off: out_temp_down
      - output.turn_off: out_tidur

  - platform: template
    name: "Filter 6 Man"
    icon: "mdi:calendar-range"
    on_press:
      - lambda: 'id(filter_target_manader) = 6;'
      - script.execute: set_filter_interval_script

  - platform: template
    name: "Filter 9 Man"
    icon: "mdi:calendar-range"
    on_press:
      - lambda: 'id(filter_target_manader) = 9;'
      - script.execute: set_filter_interval_script

  - platform: template
    name: "Filter 12 Man"
    icon: "mdi:calendar-range"
    on_press:
      - lambda: 'id(filter_target_manader) = 12;'
      - script.execute: set_filter_interval_script

# ─── Binary Sensors: LED Reading (pullup + inverted) ─────────────────────────

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO42
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Max"
    id: fan_max
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Normal"
    id: fan_normal
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO40
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Min"
    id: fan_min
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO35
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 6"
    id: temp_lamp6
    internal: true

  - platform: gpio
    pin:
      number: GPIO34
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 7"
    id: temp_lamp7
    internal: true

  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 8"
    id: temp_lamp8
    internal: true

  - platform: gpio
    pin:
      number: GPIO46
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Elpatron Aktiv"

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Sommardrift"

  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Filter Byte"
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  # ─── Admin: Confirmation Blink Sensors ──────────────────────────────────────

  - platform: template
    name: "Inställning Bekräftad"
    icon: "mdi:led-on"
    lambda: |-
      return id(blink_counter) >= 6;

  # Internal: fires briefly when blink pattern matches filter reset
  - platform: template
    id: filter_reset_trigger
    internal: true
    lambda: |-
      return id(blink_counter) >= 4 && id(fan_max).state == false
             && id(fan_normal).state == false && id(fan_min).state == false;
    on_state:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lambda: 'id(filter_confirmed) = true;'
            - delay: 5s
            - lambda: 'id(filter_confirmed) = false;'

  # Latched: stays ON for 5s after a confirmed filter reset
  - platform: template
    name: "Filter Reset Bekräftad"
    icon: "mdi:air-filter"
    lambda: |-
      return id(filter_confirmed);

  - platform: template
    name: "Boost Aktiv"
    lambda: 'return id(boost_active);'

# ─── Sensors: Derived State ───────────────────────────────────────────────────

sensor:
  - platform: template
    name: "Boost Kvar"
    unit_of_measurement: "min"
    update_interval: 15s
    lambda: |-
      if (!id(boost_active)) return {0.0f};
      float elapsed_s = (float)(millis() - id(boost_start_ms)) / 1000.0f;
      float remaining = 1200.0f - elapsed_s;
      return {remaining < 0 ? 0.0f : remaining / 60.0f};

text_sensor:
  - platform: template
    name: "Fläkt Aktuellt Läge"
    update_interval: 1s
    lambda: |-
      if (id(fan_max).state)    return {"MAX"};
      if (id(fan_normal).state) return {"NORMAL"};
      if (id(fan_min).state)    return {"MIN"};
      return {"OKÄND"};

  - platform: template
    name: "Temp Aktuellt Läge"
    update_interval: 1s
    icon: "mdi:thermometer"
    lambda: |-
      bool l6 = id(temp_lamp6).state;
      bool l7 = id(temp_lamp7).state;
      bool l8 = id(temp_lamp8).state;
      if (!l6 && !l7 && !l8) return {"0"};
      if ( l6 && !l7 && !l8) return {"1"};
      if ( l6 &&  l7 && !l8) return {"2"};
      if (!l6 &&  l7 && !l8) return {"3"};
      if (!l6 &&  l7 &&  l8) return {"4"};
      if (!l6 && !l7 &&  l8) return {"5"};
      return {"-1"};

  - platform: template
    name: "Filter Intervall"
    update_interval: 2s
    icon: "mdi:calendar-clock"
    lambda: |-
      if (id(temp_lamp6).state) return {"12 mån"};
      if (id(temp_lamp7).state) return {"9 mån"};
      if (id(temp_lamp8).state) return {"6 mån"};
      return {"Okänt"};

  - platform: template
    name: "Filter Intervall Sparat"
    update_interval: 10s
    icon: "mdi:calendar-clock"
    lambda: |-
      int m = id(filter_intervall_manader);
      if (m == 12) return {"12 mån"};
      if (m == 9)  return {"9 mån"};
      if (m == 6)  return {"6 mån"};
      return {"Okänt"};
