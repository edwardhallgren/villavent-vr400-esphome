esphome:
  name: vr
  friendly_name: VR

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Vr Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

globals:
  - id: blink_counter
    type: int
    restore_value: no
    initial_value: '0'

interval:
  - interval: 2s
    then:
      - lambda: 'id(blink_counter) = 0;'

# ─── Switches: Button Simulation (300ms pulse via optocoupler) ───────────────
# Uses switch + auto-off so HA can call switch.turn_on directly

switch:
  - platform: gpio
    pin: GPIO2
    id: sw_fan_up
    name: "Fläkt Upp"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: sw_fan_up

  - platform: gpio
    pin: GPIO1
    id: sw_fan_down
    name: "Fläkt Ned"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: sw_fan_down

  - platform: gpio
    pin: GPIO6
    id: sw_temp_up
    name: "Temp Upp"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: sw_temp_up

  - platform: gpio
    pin: GPIO5
    id: sw_temp_down
    name: "Temp Ned"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: sw_temp_down

  - platform: gpio
    pin: GPIO3
    id: sw_tidur
    name: "Tidur"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: sw_tidur

# ─── Admin: Normal Speed Setting ─────────────────────────────────────────────

button:
  - platform: template
    name: "Normal Hastighet Hög"
    icon: "mdi:fan-speed-3"
    on_press:
      - switch.turn_on: sw_fan_up
      - switch.turn_on: sw_tidur

  - platform: template
    name: "Normal Hastighet Låg"
    icon: "mdi:fan-speed-1"
    on_press:
      - switch.turn_on: sw_fan_down
      - switch.turn_on: sw_tidur

# ─── Binary Sensors: LED Reading (pullup + inverted) ─────────────────────────

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO42
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Max"
    id: fan_max
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Normal"
    id: fan_normal
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO40
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Fläkt Läge Min"
    id: fan_min
    on_state:
      - lambda: 'id(blink_counter) += 1;'

  - platform: gpio
    pin:
      number: GPIO35
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 6"
    id: temp_lamp6
    internal: true

  - platform: gpio
    pin:
      number: GPIO34
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 7"
    id: temp_lamp7
    internal: true

  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Temp Lamp 8"
    id: temp_lamp8
    internal: true

  # Optional — comment out if not yet wired
  - platform: gpio
    pin:
      number: GPIO46
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Elpatron Aktiv"

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Sommardrift"

  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Filter Byte"

# ─── Sensors: Derived State ───────────────────────────────────────────────────

text_sensor:
  - platform: template
    name: "Fläkt Aktuellt Läge"
    update_interval: 1s
    lambda: |-
      if (id(fan_max).state)    return {"MAX"};
      if (id(fan_normal).state) return {"NORMAL"};
      if (id(fan_min).state)    return {"MIN"};
      return {"OKÄND"};

  - platform: template
    name: "Temp Aktuellt Läge"
    update_interval: 1s
    icon: "mdi:thermometer"
    lambda: |-
      bool l6 = id(temp_lamp6).state;
      bool l7 = id(temp_lamp7).state;
      bool l8 = id(temp_lamp8).state;
      if (!l6 && !l7 && !l8) return {"0"};
      if ( l6 && !l7 && !l8) return {"1"};
      if ( l6 &&  l7 && !l8) return {"2"};
      if (!l6 &&  l7 && !l8) return {"3"};
      if (!l6 &&  l7 &&  l8) return {"4"};
      if (!l6 && !l7 &&  l8) return {"5"};
      return {"-1"};

# ─── Admin: Confirmation Blink Sensor ────────────────────────────────────────

binary_sensor:
  - platform: template
    name: "Inställning Bekräftad"
    icon: "mdi:led-on"
    lambda: |-
      return id(blink_counter) >= 6;
